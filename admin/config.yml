local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "/"
display_url: "/"
logo_url: "/assets/uploads/portrait-placeholder.svg"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Site Content"
        name: "site"
        file: "content/site.json"
        format: "json"
        fields:
          - label: "Global"
            name: "global"
            widget: "object"
            fields:
              - { label: "Site Name", name: "siteName", widget: "string" }
              - { label: "Brand Line", name: "brandLine", widget: "string" }
              - { label: "Footer Tagline", name: "footerTagline", widget: "string" }
              - label: "Footer Links"
                name: "footerLinks"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }
                  - { label: "External", name: "external", widget: "boolean", required: false }
          - label: "Home"
            name: "home"
            widget: "object"
            fields:
              - label: "Hero"
                name: "hero"
                widget: "object"
                fields:
                  - { label: "Kicker", name: "kicker", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
                  - { label: "Primary CTA Label", name: "primaryCtaLabel", widget: "string" }
                  - { label: "Secondary CTA Label", name: "secondaryCtaLabel", widget: "string" }
                  - { label: "Hero Image", name: "image", widget: "image" }
                  - { label: "Hero Image Alt", name: "imageAlt", widget: "string" }
                  - { label: "Badge Text", name: "badge", widget: "string" }
              - label: "Intro"
                name: "intro"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
              - label: "Feature Cards"
                name: "features"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
              - label: "Gallery"
                name: "gallery"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - label: "Images"
                    name: "images"
                    widget: "list"
                    fields:
                      - { label: "Image", name: "image", widget: "image" }
                      - { label: "Image Alt", name: "imageAlt", widget: "string" }
          - label: "Palvelut Page"
            name: "palvelut"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Lead", name: "lead", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt", name: "imageAlt", widget: "string" }
              - label: "Courses"
                name: "courses"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Format", name: "format", widget: "string" }
                  - { label: "Description", name: "text", widget: "text" }
                  - { label: "Price Label", name: "priceLabel", widget: "string" }
                  - { label: "Buy Label", name: "buyLabel", widget: "string", required: false }
                  - { label: "Buy URL", name: "buyUrl", widget: "string", required: false }
                  - { label: "Info Button Label", name: "infoLabel", widget: "string", required: false }
                  - { label: "Info Overlay Text", name: "infoText", widget: "text", required: false }
                  - { label: "Image", name: "image", widget: "image" }
                  - { label: "Image Alt", name: "imageAlt", widget: "string", required: false }
          - label: "Kirjat Page"
            name: "kirjat"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Lead", name: "lead", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt", name: "imageAlt", widget: "string" }
              - label: "Books"
                name: "books"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - label: "Status"
                    name: "status"
                    widget: "select"
                    options: ["Myynnissä", "Loppuunmyyty", "Tulossa"]
                  - { label: "Description", name: "text", widget: "text" }
                  - { label: "Cover Image", name: "image", widget: "image" }
                  - { label: "Cover Image Alt", name: "imageAlt", widget: "string", required: false }
              - label: "Order Section"
                name: "order"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Payment & Shipping Instructions", name: "instructions", widget: "text" }
                  - { label: "Success Message", name: "successMessage", widget: "string" }
          - label: "Yhteystiedot Page"
            name: "yhteystiedot"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Lead", name: "lead", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt", name: "imageAlt", widget: "string" }
              - label: "Contact Items"
                name: "contactItems"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Value", name: "value", widget: "string" }
              - label: "Event Inquiry Form"
                name: "inquiry"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Intro Text", name: "intro", widget: "text" }
                  - { label: "Success Message", name: "successMessage", widget: "string" }
                  - { label: "Image", name: "image", widget: "image" }
                  - { label: "Image Alt", name: "imageAlt", widget: "string" }
          - label: "Tapahtumia Page"
            name: "tapahtumia"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Lead", name: "lead", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt", name: "imageAlt", widget: "string" }
              - label: "Upcoming Events"
                name: "upcoming"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Date", name: "date", widget: "string" }
                  - { label: "Location", name: "location", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
                  - { label: "Button Label", name: "buttonLabel", widget: "string", required: false }
                  - { label: "Button URL", name: "buttonUrl", widget: "string", required: false }
              - label: "Past Events"
                name: "past"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Date", name: "date", widget: "string" }
                  - { label: "Location", name: "location", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
                  - { label: "Button Label", name: "buttonLabel", widget: "string", required: false }
                  - { label: "Button URL", name: "buttonUrl", widget: "string", required: false }
              - label: "Social"
                name: "social"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Note", name: "note", widget: "text" }
                  - { label: "Facebook URL", name: "facebookUrl", widget: "string", required: false, hint: "Facebook-sivun osoite, esim. https://www.facebook.com/marjo.seki. Tuorein julkaisuvirta näkyy sivulla automaattisesti tämän perusteella." }
                  - { label: "Instagram URL", name: "instagramUrl", widget: "string", required: false, hint: "Instagram-profiilin osoite. Näkyy 'Avaa Instagram' -painikkeena." }
                  - { label: "Facebook Embed URL", name: "facebookEmbedUrl", widget: "string", required: false, hint: "Valinnainen. Täytä vain jos haluat korvata automaattisen upotuksen omalla upotusosoitteella." }
                  - { label: "Instagram Embed URL", name: "instagramEmbedUrl", widget: "string", required: false, hint: "Liitä tähän linkki yksittäiseen Instagram-julkaisuun tai -reeliin (esim. https://www.instagram.com/p/ABC123/), niin se näkyy upotettuna sivulla. Päivitä linkki uusimpaan julkaisuun aina kun haluat vaihtaa näkyvän postauksen." }
